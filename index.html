<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dados Mestrado - Ana Mallin</title>
  <style>
    :root {
      --baby-blue: #bfe9ff;
      --blue-clear: #dff6ff;
      --rose: #ffd1df;
      --rose-strong: #f29bb8;
      --ink: #17263b;
      --ink-soft: #39536d;
      --line: rgba(23, 38, 59, 0.18);
      --white: #fffafc;
      --shadow: rgba(23, 38, 59, 0.18);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Helvetica Now Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at var(--mouse-x, 52%) var(--mouse-y, 48%), rgba(255, 255, 255, 0.64), transparent 24rem),
        linear-gradient(135deg, rgba(223, 246, 255, 0.7), rgba(255, 209, 223, 0.64)),
        url("planodefundositeana.jpg") center / cover fixed;
      overflow-x: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 22px;
      isolation: isolate;
    }

    .soft-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, var(--line) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.34), transparent 74%);
      pointer-events: none;
      z-index: -3;
    }

    .content {
      width: min(920px, 100%);
      text-align: center;
      animation: enter 800ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      padding: 8px 12px;
      border: 1px solid rgba(23, 38, 59, 0.2);
      border-radius: 8px;
      background: rgba(255, 250, 252, 0.62);
      color: var(--ink-soft);
      font-size: 0.9rem;
      font-weight: 700;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--rose-strong);
      box-shadow: 0 0 0 0 rgba(242, 155, 184, 0.58);
      animation: pulse 1.8s infinite;
    }

    h1 {
      margin: 0;
      font-size: clamp(3.4rem, 9vw, 8.2rem);
      line-height: 0.9;
      letter-spacing: 0;
      font-weight: 800;
      color: var(--ink);
      text-wrap: balance;
    }

    .subtitle {
      margin: 20px 0 0;
      font-size: clamp(1.35rem, 3.6vw, 2.4rem);
      line-height: 1.1;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      width: min(720px, 100%);
      margin: 48px auto 0;
    }

    .action-button {
      position: relative;
      min-height: 92px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 22px 26px;
      border: 2px solid rgba(23, 38, 59, 0.22);
      border-radius: 8px;
      background: rgba(255, 250, 252, 0.78);
      color: var(--ink);
      box-shadow: 0 18px 38px var(--shadow);
      font: inherit;
      font-size: clamp(1.02rem, 2.6vw, 1.32rem);
      font-weight: 800;
      letter-spacing: 0;
      text-decoration: none;
      cursor: pointer;
      overflow: hidden;
      transform: translateY(0);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .action-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(191, 233, 255, 0.75), rgba(255, 209, 223, 0.88));
      opacity: 0;
      transition: opacity 180ms ease;
      z-index: -1;
    }

    .action-button:hover,
    .action-button:focus-visible {
      transform: translateY(-5px);
      border-color: rgba(23, 38, 59, 0.52);
      box-shadow: 0 24px 46px rgba(23, 38, 59, 0.24);
      outline: none;
    }

    .action-button:hover::before,
    .action-button:focus-visible::before {
      opacity: 1;
    }

    .action-button:active {
      transform: translateY(-1px) scale(0.99);
    }

    .action-button.is-selected {
      background: var(--ink);
      border-color: var(--ink);
      color: var(--white);
    }

    .status {
      min-height: 28px;
      margin: 22px 0 0;
      color: var(--ink-soft);
      font-size: 1rem;
      font-weight: 700;
    }

    .nodes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .node {
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--rose-strong);
      box-shadow: 0 0 0 8px rgba(255, 209, 223, 0.32);
      animation: float 7s ease-in-out infinite;
    }

    .node:nth-child(1) {
      left: 12%;
      top: 18%;
      background: #64bde8;
    }

    .node:nth-child(2) {
      left: 80%;
      top: 16%;
      animation-delay: -2s;
    }

    .node:nth-child(3) {
      left: 14%;
      top: 76%;
      animation-delay: -4s;
    }

    .node:nth-child(4) {
      left: 86%;
      top: 72%;
      background: #64bde8;
      animation-delay: -1s;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      70% {
        box-shadow: 0 0 0 12px rgba(242, 155, 184, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(242, 155, 184, 0);
      }
    }

    @keyframes float {
      0%,
      100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(18px, -22px, 0);
      }
    }

    @media (max-width: 680px) {
      .page {
        padding: 34px 18px;
      }

      .actions {
        grid-template-columns: 1fr;
        margin-top: 38px;
      }

      .action-button {
        min-height: 82px;
      }

    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="soft-grid" aria-hidden="true"></div>
    <div class="nodes" aria-hidden="true">
      <span class="node"></span>
      <span class="node"></span>
      <span class="node"></span>
      <span class="node"></span>
    </div>

    <section class="content" aria-labelledby="title">
      <p class="eyebrow"><span class="pulse" aria-hidden="true"></span>2026</p>
      <h1 id="title">Dados Mestrado</h1>
      <p class="subtitle">Ana Mallin</p>

      <div class="actions" aria-label="Escolha uma área de dados">
        <a class="action-button" href="dados-experimentais.html" data-target="Dados Experimentais">
          Dados Experimentais
        </a>
        <a class="action-button" href="dados-banco-dados.html" data-target="Dados do Banco de Dados">
          Dados do Banco de Dados
        </a>
      </div>

      <p class="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const root = document.documentElement;
    const buttons = document.querySelectorAll(".action-button");
    const status = document.querySelector(".status");

    window.addEventListener("pointermove", (event) => {
      root.style.setProperty("--mouse-x", `${event.clientX}px`);
      root.style.setProperty("--mouse-y", `${event.clientY}px`);
    });

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        buttons.forEach((item) => item.classList.remove("is-selected"));
        button.classList.add("is-selected");
        status.textContent = `${button.dataset.target} selecionado.`;
      });
    });
  </script>
</body>
</html>
