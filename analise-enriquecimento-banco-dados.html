<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Análise e Enriquecimento - Banco de Dados</title>
  <style>
    :root {
      --ink: #182337;
      --ink-soft: #4a5b70;
      --white: #fffdfd;
      --line: rgba(24, 35, 55, 0.12);
      --shadow: rgba(24, 35, 55, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Helvetica Now Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 38%), rgba(191, 233, 255, 0.42), transparent 22rem),
        linear-gradient(135deg, rgba(255, 209, 223, 0.32), transparent 34%),
        var(--white);
    }

    .page {
      width: min(1120px, 100%);
      margin: 0 auto;
      padding: 34px 22px 64px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      margin-bottom: 22px;
      color: var(--ink-soft);
      font-size: 0.94rem;
      font-weight: 800;
      text-decoration: none;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--ink);
      outline: none;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1;
    }

    .subtitle {
      margin: 14px 0 0;
      color: var(--ink-soft);
      font-size: 1rem;
      line-height: 1.55;
      max-width: 780px;
    }

    .section-card,
    .contrast-section {
      margin-top: 26px;
      padding: 18px;
      border: 1px solid rgba(24, 35, 55, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.84);
      box-shadow: 0 14px 28px var(--shadow);
    }

    .section-card h2,
    .contrast-section h2 {
      margin: 0 0 14px;
      font-size: 1.1rem;
      font-weight: 900;
    }

    .figure-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .single-figure {
      display: grid;
      gap: 10px;
    }

    .figure-card {
      display: grid;
      gap: 10px;
      padding: 14px;
      border: 1px solid rgba(24, 35, 55, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      min-width: 0;
    }

    .figure-card h3 {
      margin: 0;
      font-size: 0.98rem;
      font-weight: 850;
      overflow-wrap: anywhere;
    }

    .figure-image {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
      background: white;
    }

    .figure-image.zoomable {
      cursor: zoom-in;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .figure-image.zoomable:hover,
    .figure-image.zoomable:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 18px 36px rgba(24, 35, 55, 0.18);
      outline: 3px solid rgba(91, 189, 233, 0.42);
      outline-offset: 3px;
    }

    .zoom-overlay {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(24, 35, 55, 0.82);
      z-index: 999;
    }

    .zoom-overlay[hidden] {
      display: none;
    }

    .zoom-dialog {
      position: relative;
      max-width: min(1180px, 96vw);
      max-height: 92vh;
      padding: 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.28);
    }

    .zoom-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 999px;
      background: rgba(24, 35, 55, 0.1);
      color: var(--ink);
      font-size: 1.1rem;
      font-weight: 900;
      cursor: pointer;
    }

    .zoom-close:hover,
    .zoom-close:focus-visible {
      background: rgba(24, 35, 55, 0.18);
      outline: none;
    }

    .zoom-image {
      display: block;
      max-width: min(1120px, 88vw);
      max-height: calc(92vh - 32px);
      width: auto;
      height: auto;
      margin-top: 18px;
      border-radius: 10px;
      background: white;
    }

    @media (max-width: 840px) {
      .figure-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

    </div>

  <script>
    const root = document.documentElement;
    const zoomOverlay = document.getElementById("zoom-overlay");
    const zoomImage = document.getElementById("zoom-image");
    const zoomClose = document.getElementById("zoom-close");

    window.addEventListener("pointermove", (event) => {
      root.style.setProperty("--mouse-x", `${event.clientX}px`);
      root.style.setProperty("--mouse-y", `${event.clientY}px`);
    });

    const openZoom = (image) => {
      zoomImage.src = image.src;
      zoomImage.alt = image.alt;
      zoomOverlay.hidden = false;
    };

    const closeZoom = () => {
      zoomOverlay.hidden = true;
      zoomImage.src = "";
      zoomImage.alt = "";
    };

    document.querySelectorAll(".figure-image.zoomable").forEach((image) => {
      image.addEventListener("click", () => openZoom(image));
      image.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          openZoom(image);
        }
      });
    });

    zoomOverlay.addEventListener("click", (event) => {
      if (event.target === zoomOverlay) {
        closeZoom();
      }
    });

    zoomClose.addEventListener("click", closeZoom);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && !zoomOverlay.hidden) {
        closeZoom();
      }
    });
  </script>
