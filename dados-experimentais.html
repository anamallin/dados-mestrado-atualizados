<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dados Experimentais - Ana Mallin</title>
  <style>
    :root {
      --black: #050608;
      --white: #fffafd;
      --baby-blue: #bfe9ff;
      --blue-bright: #77cff7;
      --rose: #ffd1df;
      --rose-bright: #f29bb8;
      --muted: rgba(255, 250, 253, 0.76);
      --line: rgba(191, 233, 255, 0.16);
      --shadow-blue: rgba(119, 207, 247, 0.25);
      --shadow-rose: rgba(242, 155, 184, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      font-family: "Helvetica Now Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--white);
      background:
        radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 42%), rgba(191, 233, 255, 0.2), transparent 22rem),
        radial-gradient(circle at 18% 22%, rgba(242, 155, 184, 0.28), transparent 18rem),
        linear-gradient(135deg, #050608 0%, #101218 54%, #050608 100%);
      overflow-x: hidden;
    }

    .page {
      position: relative;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 48px 22px;
      isolation: isolate;
    }

    .soft-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--line) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 209, 223, 0.11) 1px, transparent 1px);
      background-size: 58px 58px;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.6), transparent 78%);
      pointer-events: none;
      z-index: -3;
    }

    .glow-line {
      position: absolute;
      width: min(620px, 76vw);
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--baby-blue), var(--rose), transparent);
      filter: drop-shadow(0 0 18px rgba(191, 233, 255, 0.4));
      opacity: 0.8;
      animation: lineDrift 7s ease-in-out infinite;
      pointer-events: none;
      z-index: -1;
    }

    .glow-line.top {
      top: 18%;
      left: 9%;
    }

    .glow-line.bottom {
      right: 7%;
      bottom: 18%;
      animation-delay: -3s;
    }

    .content {
      width: min(920px, 100%);
      text-align: center;
      animation: enter 760ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 26px;
      color: var(--muted);
      font-size: 0.96rem;
      font-weight: 800;
      text-decoration: none;
      transition: color 180ms ease, transform 180ms ease;
    }

    .back-link:hover,
    .back-link:focus-visible {
      color: var(--white);
      transform: translateY(-2px);
      outline: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 18px;
      padding: 8px 12px;
      border: 1px solid rgba(191, 233, 255, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--baby-blue);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--rose-bright);
      box-shadow: 0 0 0 0 rgba(242, 155, 184, 0.58);
      animation: pulse 1.8s infinite;
    }

    h1 {
      margin: 0;
      color: var(--white);
      font-size: clamp(2.9rem, 8vw, 7.4rem);
      font-weight: 850;
      line-height: 0.92;
      letter-spacing: 0;
      text-wrap: balance;
      text-shadow: 0 0 34px rgba(191, 233, 255, 0.22);
    }

    .subtitle {
      margin: 20px 0 0;
      color: var(--muted);
      font-size: clamp(1.15rem, 3vw, 1.85rem);
      line-height: 1.25;
      font-weight: 650;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      width: min(820px, 100%);
      margin: 48px auto 0;
    }

    .action-button {
      position: relative;
      min-height: 108px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 24px 24px;
      border: 2px solid rgba(191, 233, 255, 0.28);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.055);
      color: var(--white);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.36);
      font: inherit;
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 850;
      line-height: 1.18;
      letter-spacing: 0;
      text-decoration: none;
      cursor: pointer;
      overflow: hidden;
      transform: translateY(0);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .action-button::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, rgba(191, 233, 255, 0.24), rgba(255, 209, 223, 0.24)),
        radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.16), transparent 58%);
      opacity: 0;
      transition: opacity 180ms ease;
      z-index: -1;
    }

    .action-button:hover,
    .action-button:focus-visible {
      transform: translateY(-5px);
      border-color: rgba(255, 209, 223, 0.72);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 30px var(--shadow-blue), 0 0 46px var(--shadow-rose);
      outline: none;
    }

    .action-button:hover::before,
    .action-button:focus-visible::before {
      opacity: 1;
    }

    .action-button:active {
      transform: translateY(-1px) scale(0.99);
    }

    .action-button.is-selected {
      border-color: var(--rose);
      background: linear-gradient(120deg, rgba(191, 233, 255, 0.22), rgba(255, 209, 223, 0.26));
      box-shadow: 0 0 30px var(--shadow-blue), 0 0 46px var(--shadow-rose);
    }

    .status {
      min-height: 28px;
      margin: 22px 0 0;
      color: var(--baby-blue);
      font-size: 1rem;
      font-weight: 800;
    }

    .nodes {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .node {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--rose-bright);
      box-shadow: 0 0 0 7px rgba(242, 155, 184, 0.12), 0 0 28px rgba(242, 155, 184, 0.48);
      animation: float 7s ease-in-out infinite;
    }

    .node:nth-child(1) {
      left: 12%;
      top: 18%;
      background: var(--blue-bright);
      box-shadow: 0 0 0 7px rgba(191, 233, 255, 0.12), 0 0 28px rgba(119, 207, 247, 0.48);
    }

    .node:nth-child(2) {
      left: 82%;
      top: 18%;
      animation-delay: -2s;
    }

    .node:nth-child(3) {
      left: 14%;
      top: 78%;
      animation-delay: -4s;
    }

    .node:nth-child(4) {
      left: 86%;
      top: 72%;
      background: var(--blue-bright);
      box-shadow: 0 0 0 7px rgba(191, 233, 255, 0.12), 0 0 28px rgba(119, 207, 247, 0.48);
      animation-delay: -1s;
    }

    @keyframes enter {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      70% {
        box-shadow: 0 0 0 12px rgba(242, 155, 184, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(242, 155, 184, 0);
      }
    }

    @keyframes float {
      0%,
      100% {
        transform: translate3d(0, 0, 0);
      }
      50% {
        transform: translate3d(18px, -22px, 0);
      }
    }

    @keyframes lineDrift {
      0%,
      100% {
        transform: translate3d(0, 0, 0) rotate(-2deg);
      }
      50% {
        transform: translate3d(28px, 12px, 0) rotate(2deg);
      }
    }

    @media (max-width: 680px) {
      .page {
        padding: 34px 18px;
      }

      .actions {
        grid-template-columns: 1fr;
        margin-top: 38px;
      }

      .action-button {
        min-height: 92px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="soft-grid" aria-hidden="true"></div>
    <span class="glow-line top" aria-hidden="true"></span>
    <span class="glow-line bottom" aria-hidden="true"></span>
    <div class="nodes" aria-hidden="true">
      <span class="node"></span>
      <span class="node"></span>
      <span class="node"></span>
      <span class="node"></span>
    </div>

    <section class="content" aria-labelledby="title">
      <a class="back-link" href="index.html">Voltar para Dados Mestrado</a>
      <p class="eyebrow"><span class="pulse" aria-hidden="true"></span>Dados Experimentais</p>
      <h1 id="title">Dados Experimentais</h1>
      <p class="subtitle">Escolha a área que deseja acessar.</p>

      <div class="actions" aria-label="Escolha uma área dos dados experimentais">
        <a class="action-button" href="amostras.html" data-target="Amostras">
          Amostras (Caracterização/Obtenção)
        </a>
        <a class="action-button" href="tratamento-analise-estatistica.html" data-target="Tratamento e Análise Estatística">
          Tratamento e Análise Estatística
        </a>
      </div>

      <p class="status" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const root = document.documentElement;
    const buttons = document.querySelectorAll(".action-button");
    const status = document.querySelector(".status");

    window.addEventListener("pointermove", (event) => {
      root.style.setProperty("--mouse-x", `${event.clientX}px`);
      root.style.setProperty("--mouse-y", `${event.clientY}px`);
    });

    buttons.forEach((button) => {
      button.addEventListener("click", () => {
        buttons.forEach((item) => item.classList.remove("is-selected"));
        button.classList.add("is-selected");
        status.textContent = `${button.dataset.target} selecionado.`;
      });
    });
  </script>
</body>
</html>
